<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 260" role="img" aria-labelledby="title desc">
  <title id="title">Lavender Sprig</title>
  <desc id="desc">Three lavender stalks with stacked purple florets swaying on a shared stem.</desc>
  <defs>
    <linearGradient id="lvStem" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8dbb72" />
      <stop offset="100%" stop-color="#4a7c3f" />
    </linearGradient>
  </defs>
  <style>
    .lv-plant  { transform-origin: 120px 228px; animation: lvSway 5s ease-in-out infinite; }
    .lv-spires { transform-origin: 117px 122px; animation: lvSpires 3.6s ease-in-out infinite; }

    @keyframes lvSway   { 0%,100%{ transform: rotate(-2deg); } 50%{ transform: rotate(2.4deg); } }
    @keyframes lvSpires { 0%,100%{ transform: rotate(-0.6deg); } 50%{ transform: rotate(0.8deg); } }
  </style>

  <g class="lv-plant">
    <!-- Main stem -->
    <path d="M120 228 C115 200, 115 180, 117 163" stroke="url(#lvStem)" stroke-width="7" stroke-linecap="round" fill="none" />
    <!-- Lower leaves -->
    <path d="M116 206 C95 196, 89 178, 103 172 C116 167, 120 181, 116 206 Z" fill="#5fa855" />
    <path d="M119 190 C140 180, 148 162, 134 157 C122 153, 115 166, 119 190 Z" fill="#74bc68" />
    <!-- Small lance leaves near branch point -->
    <path d="M111 162 C98 153, 96 140, 108 137 C117 134, 119 147, 111 162 Z" fill="#6ab260" opacity="0.88" />
    <path d="M120 156 C133 147, 137 134, 126 131 C117 129, 113 142, 120 156 Z" fill="#7cc872" opacity="0.88" />

    <g class="lv-spires">
      <!-- Stalk 1: center (x≈118), florets y=78→142 -->
      <path d="M117 163 C116 142, 116 110, 118 78" stroke="#8aaa6a" stroke-width="3" stroke-linecap="round" fill="none" />
      <ellipse cx="110" cy="80" rx="5" ry="8" fill="#c084fc" transform="rotate(-20 110 80)" />
      <ellipse cx="126" cy="89" rx="5" ry="8" fill="#a855f7" transform="rotate(20 126 89)" />
      <ellipse cx="110" cy="98" rx="5" ry="8" fill="#c084fc" transform="rotate(-20 110 98)" />
      <ellipse cx="126" cy="107" rx="5" ry="8" fill="#a855f7" transform="rotate(20 126 107)" />
      <ellipse cx="110" cy="116" rx="5" ry="8" fill="#c084fc" transform="rotate(-20 110 116)" />
      <ellipse cx="126" cy="125" rx="5" ry="8" fill="#a855f7" transform="rotate(20 126 125)" />
      <ellipse cx="110" cy="134" rx="5" ry="8" fill="#c084fc" transform="rotate(-20 110 134)" />
      <ellipse cx="118" cy="143" rx="5" ry="8" fill="#9333ea" />

      <!-- Stalk 2: left (x≈103), florets y=96→145 -->
      <path d="M117 163 C112 150, 107 124, 103 96" stroke="#8aaa6a" stroke-width="3" stroke-linecap="round" fill="none" />
      <ellipse cx="95"  cy="97"  rx="5" ry="8" fill="#ddd6fe" transform="rotate(-20 95 97)" />
      <ellipse cx="111" cy="106" rx="5" ry="8" fill="#a855f7" transform="rotate(20 111 106)" />
      <ellipse cx="95"  cy="115" rx="5" ry="8" fill="#ddd6fe" transform="rotate(-20 95 115)" />
      <ellipse cx="111" cy="124" rx="5" ry="8" fill="#a855f7" transform="rotate(20 111 124)" />
      <ellipse cx="95"  cy="133" rx="5" ry="8" fill="#ddd6fe" transform="rotate(-20 95 133)" />
      <ellipse cx="103" cy="143" rx="5" ry="8" fill="#9333ea" />

      <!-- Stalk 3: right (x≈133), florets y=89→143 -->
      <path d="M117 163 C121 148, 127 120, 133 89" stroke="#8aaa6a" stroke-width="3" stroke-linecap="round" fill="none" />
      <ellipse cx="125" cy="90"  rx="5" ry="8" fill="#ddd6fe" transform="rotate(-20 125 90)" />
      <ellipse cx="141" cy="99"  rx="5" ry="8" fill="#a855f7" transform="rotate(20 141 99)" />
      <ellipse cx="125" cy="108" rx="5" ry="8" fill="#ddd6fe" transform="rotate(-20 125 108)" />
      <ellipse cx="141" cy="117" rx="5" ry="8" fill="#a855f7" transform="rotate(20 141 117)" />
      <ellipse cx="125" cy="126" rx="5" ry="8" fill="#ddd6fe" transform="rotate(-20 125 126)" />
      <ellipse cx="133" cy="136" rx="5" ry="8" fill="#9333ea" />
    </g>
  </g>
</svg>
