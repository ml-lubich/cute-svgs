<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 260" role="img" aria-labelledby="bsTitle bsDesc">
  <title id="bsTitle">Buttercup Spark</title>
  <desc id="bsDesc">A glossy yellow buttercup flickers with small sunny sparkles.</desc>
  <defs>
    <linearGradient id="bsStem" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#8ddf70"/><stop offset="100%" stop-color="#2f7d32"/></linearGradient>
    <radialGradient id="bsPetal" cx="50%" cy="42%" r="60%"><stop offset="0%" stop-color="#fef9c3"/><stop offset="62%" stop-color="#fde047"/><stop offset="100%" stop-color="#eab308"/></radialGradient>
  </defs>
  <style>
    .bs-plant{transform-origin:120px 228px;animation:bsSway 4.5s ease-in-out infinite}.bs-head{transform-origin:120px 90px;animation:bsShine 3.2s ease-in-out infinite}.bs-spark{animation:bsSpark 2.2s ease-in-out infinite}.bs-spark.alt{animation-delay:-1.1s}@keyframes bsSway{0%,100%{transform:rotate(-1.4deg)}50%{transform:rotate(2.2deg)}}@keyframes bsShine{0%,100%{transform:scale(.98)}50%{transform:scale(1.05) rotate(-1deg)}}@keyframes bsSpark{0%,100%{opacity:.2;transform:scale(.7)}50%{opacity:1;transform:scale(1.25)}}
  </style>
  <g class="bs-plant">
    <path d="M120 228 C123 184 116 139 120 108" stroke="url(#bsStem)" stroke-width="7" stroke-linecap="round" fill="none"/>
    <path d="M114 184 C90 176 82 157 101 148 C120 140 129 161 114 184 Z" fill="#22c55e"/>
    <path d="M126 166 C151 158 160 137 142 130 C124 122 114 145 126 166 Z" fill="#65a30d"/>
    <g class="bs-head">
      <g fill="url(#bsPetal)"><ellipse cx="120" cy="59" rx="17" ry="31"/><ellipse cx="120" cy="59" rx="17" ry="31" transform="rotate(72 120 90)"/><ellipse cx="120" cy="59" rx="17" ry="31" transform="rotate(144 120 90)"/><ellipse cx="120" cy="59" rx="17" ry="31" transform="rotate(216 120 90)"/><ellipse cx="120" cy="59" rx="17" ry="31" transform="rotate(288 120 90)"/></g>
      <circle cx="120" cy="90" r="13" fill="#facc15"/><circle cx="120" cy="90" r="6" fill="#a16207"/><path d="M110 72 C115 68 124 67 131 71" stroke="#fff7ad" stroke-width="4" stroke-linecap="round" fill="none" opacity=".72"/>
    </g>
    <path class="bs-spark" d="M79 70 l4 8 8 4-8 4-4 8-4-8-8-4 8-4Z" fill="#fde047"/><path class="bs-spark alt" d="M164 53 l3 6 6 3-6 3-3 6-3-6-6-3 6-3Z" fill="#fef08a"/><circle class="bs-spark" cx="166" cy="121" r="3" fill="#fb923c"/>
  </g>
</svg>
