<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 260" role="img" aria-labelledby="spTitle spDesc">
  <title id="spTitle">Snapdragon Parade</title>
  <desc id="spDesc">Stacked snapdragon blossoms bounce gently up a tall green spike.</desc>
  <defs>
    <linearGradient id="spStem" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#86efac"/><stop offset="100%" stop-color="#15803d"/></linearGradient>
    <linearGradient id="spPetal" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#fed7aa"/><stop offset="100%" stop-color="#ec4899"/></linearGradient>
  </defs>
  <style>
    .sp-plant{transform-origin:120px 228px;animation:spSway 4.7s ease-in-out infinite}.sp-bloom{animation:spBounce 2.8s ease-in-out infinite;transform-box:fill-box;transform-origin:center}.sp-bloom.alt{animation-delay:-1.4s}.sp-calyx{fill:#16a34a}.sp-sprout{stroke:url(#spStem);stroke-width:4;stroke-linecap:round;fill:none}@keyframes spSway{0%,100%{transform:rotate(-1.7deg)}50%{transform:rotate(2deg)}}@keyframes spBounce{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-3px) scale(1.04)}}
  </style>
  <g class="sp-plant">
    <path d="M120 228 C117 184 119 137 120 77" stroke="url(#spStem)" stroke-width="7" stroke-linecap="round" fill="none"/>
    <path d="M113 190 C88 182 80 160 99 152 C119 144 128 166 113 190 Z" fill="#22c55e"/>
    <path d="M127 172 C153 163 162 141 143 133 C124 125 114 149 127 172 Z" fill="#65a30d"/>
    <g transform="translate(119 74)"><path class="sp-sprout" d="M0 12 C-4 13 -8 13 -12 13"/><g transform="translate(-25 -1)"><g class="sp-bloom"><path d="M25 14 C14 7 17 -7 30 -8 C43 -9 50 3 42 15 C36 24 31 25 25 14 Z" fill="url(#spPetal)"/><ellipse cx="33" cy="11" rx="12" ry="8" fill="#fb7185"/><path class="sp-calyx" d="M21 12 L13 8 L17 16 Z"/></g></g></g>
    <g transform="translate(121 94)"><path class="sp-sprout" d="M0 12 C4 13 8 13 12 13"/><g transform="translate(0 -1)"><g class="sp-bloom alt"><path d="M0 14 C-11 7 -8 -7 5 -8 C18 -9 25 3 17 15 C11 24 7 25 0 14 Z" fill="url(#spPetal)"/><ellipse cx="8" cy="11" rx="12" ry="8" fill="#f9a8d4"/><path class="sp-calyx" d="M-4 12 L-12 8 L-8 16 Z"/></g></g></g>
    <g transform="translate(119 116)"><path class="sp-sprout" d="M0 13 C-5 14 -10 14 -15 14"/><g transform="translate(-31 -1)"><g class="sp-bloom"><path d="M31 14 C19 7 22 -8 36 -9 C50 -9 58 4 49 16 C42 25 38 25 31 14 Z" fill="url(#spPetal)"/><ellipse cx="40" cy="12" rx="13" ry="8" fill="#f472b6"/><path class="sp-calyx" d="M27 12 L15 8 L20 17 Z"/></g></g></g>
    <g transform="translate(121 137)"><path class="sp-sprout" d="M0 13 C5 14 10 14 15 14"/><g transform="translate(4 -1)"><g class="sp-bloom alt"><path d="M0 14 C-12 7 -9 -8 5 -9 C19 -9 27 4 18 16 C11 25 7 25 0 14 Z" fill="url(#spPetal)"/><ellipse cx="9" cy="12" rx="13" ry="8" fill="#fb7185"/><path class="sp-calyx" d="M-4 12 L-16 8 L-11 17 Z"/></g></g></g>
    <g transform="translate(119 157)"><path class="sp-sprout" d="M0 13 C-4 14 -8 14 -12 14"/><g transform="translate(-27 -1)"><g class="sp-bloom"><path d="M27 14 C15 7 18 -8 32 -9 C46 -9 54 4 45 16 C38 25 34 25 27 14 Z" fill="url(#spPetal)"/><ellipse cx="36" cy="12" rx="13" ry="8" fill="#f9a8d4"/><path class="sp-calyx" d="M23 12 L12 8 L17 17 Z"/></g></g></g>
  </g>
</svg>
