<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 260" role="img" aria-labelledby="title desc">
  <title id="title">Monstera Glow</title>
  <desc id="desc">A potted monstera with floating leaves and soft light.</desc>
  <defs>
    <linearGradient id="mLeaf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#70cb78" />
      <stop offset="100%" stop-color="#348d4b" />
    </linearGradient>
    <radialGradient id="mAura" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#b8ffd6" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#b8ffd6" stop-opacity="0" />
    </radialGradient>
  </defs>
  <style>
    .left-leaf {
      transform-origin: 87px 128px;
      animation: waveLeft 5s ease-in-out infinite;
    }

    .right-leaf {
      transform-origin: 154px 123px;
      animation: waveRight 5s ease-in-out infinite;
    }

    .center-leaf {
      transform-origin: 120px 108px;
      animation: floatLeaf 4.1s ease-in-out infinite;
    }

    .aura {
      animation: auraPulse 3.1s ease-in-out infinite;
    }

    @keyframes waveLeft {
      0%,
      100% { transform: rotate(14deg) scale(0.97); }
      50% { transform: rotate(23deg) scale(1.04); }
    }

    @keyframes waveRight {
      0%,
      100% { transform: rotate(-14deg) scale(0.97); }
      50% { transform: rotate(-23deg) scale(1.04); }
    }

    @keyframes floatLeaf {
      0%,
      100% { transform: translateY(0) rotate(-3deg); }
      50% { transform: translateY(-7px) rotate(4deg); }
    }

    @keyframes auraPulse {
      0%,
      100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
  </style>

  <ellipse class="aura" cx="120" cy="112" rx="72" ry="46" fill="url(#mAura)" />

  <path d="M120 216 L120 125" stroke="#3d7f47" stroke-width="7" stroke-linecap="round" />
  <path d="M109 202 L92 138" stroke="#3d7f47" stroke-width="5" stroke-linecap="round" />
  <path d="M132 196 L151 136" stroke="#3d7f47" stroke-width="5" stroke-linecap="round" />

  <path class="left-leaf" d="M89 132 C61 117, 58 86, 86 76 C118 65, 132 103, 103 128 C99 131, 94 132, 89 132 Z" fill="url(#mLeaf)" />
  <path class="right-leaf" d="M152 126 C182 110, 185 80, 156 71 C126 62, 112 99, 140 123 C143 126, 148 127, 152 126 Z" fill="url(#mLeaf)" />
  <path class="center-leaf" d="M120 114 C98 103, 94 77, 117 66 C141 56, 154 84, 134 106 C130 110, 124 114, 120 114 Z" fill="url(#mLeaf)" />

  <ellipse cx="120" cy="226" rx="38" ry="11" fill="#ddffe7" />
  <path d="M86 226 C86 207, 98 193, 120 193 C142 193, 154 207, 154 226 Z" fill="#88d0a0" />
</svg>
